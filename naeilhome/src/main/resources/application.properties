#db Connection(Postgres)
spring.datasource.url=${DB_INTERNAL_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# MyBatis 설정 파일의 경로를 지정합니다.
mybatis.config-location=classpath:mybatis/model/modelConfig.xml

# 매퍼 XML 파일들의 위치를 지정합니다.
mybatis.mapper-locations=classpath:mybatis/mappers/*.xml

# mybatis.mapper-locations=classpath:com/spring/gami/mapper/*.xml

# 마이바티스가 별칭을 찾을 패키지를 지정
mybatis.type-aliases-package=com.spring.naeilhome

# view Resolver 설정
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# 파일 업로드 용량 설정
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

